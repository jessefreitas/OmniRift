# Cloudflare Worker — License Worker do OmniRift.
# Deploy: wrangler deploy | DB: npm run db:init
name = "omnirift-license-worker"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "omnirift-licenses"
database_id = "e8f2eb1a-85d9-4a44-8c80-05dca34c63cd"

# Secrets (NUNCA aqui — usar `wrangler secret put <NOME>`):
#   ASAAS_API_KEY · ED25519_PRIVATE_KEY · OMNICHAT_TOKEN · ASAAS_WEBHOOK_TOKEN
#   SMTP_USER · SMTP_PASS (no-reply@omniforge.com.br — email via SMTP direto/cloudflare:sockets)

[vars]
# Assinatura (Asaas Subscriptions), cartão de crédito, trial 7d (1ª cobrança em +7d).
BILLING_TYPE = "CREDIT_CARD"
PRICE_MONTHLY_CENTS = "1490"   # R$ 14,90 / mês (ciclo MONTHLY)
PRICE_YEARLY_CENTS = "10990"   # R$ 109,90 / ano (ciclo YEARLY)
TRIAL_DAYS = "7"
SEAT_CAP = "3"
# Beta tester program (60d full, sem Asaas). ADMIN_TOKEN é SECRET (wrangler secret put).
BETA_DAYS = "60"
BETA_LAUNCH = "1"              # beta de lançamento: /signup pago OFF (sem cobrança/email Asaas). Vira "0" quando começar a cobrar.
BETA_DISCOUNT_PCT = "30"
# Checkout hospedado (SÓ cartão, link expira em CHECKOUT_MINUTES; faixa 10..1440).
CHECKOUT_MINUTES = "30"
DONATION_CENTS = "1090"        # doação /donate: R$10,90, pagamento único, PIX + cartão
CHECKOUT_SUCCESS_URL = "https://omnirift.omniforge.com.br/checkout/success"
CHECKOUT_CANCEL_URL = "https://omnirift.omniforge.com.br/checkout/cancel"
CHECKOUT_EXPIRED_URL = "https://omnirift.omniforge.com.br/checkout/expired"
# Asaas: PRODUÇÃO (conta OMNIFORGE). Sandbox = https://sandbox.asaas.com/api/v3
ASAAS_BASE = "https://api.asaas.com/v3"
OMNICHAT_BASE = "https://chat.omniforge.com.br"
OMNICHAT_ACCOUNT = "2"
OMNICHAT_INBOX = "196"
OMNICHAT_FUNNEL = "59"
# Stages do funil "OmniRift Pro" #59 (ver omnichat). novo/perdido têm sufixo de timestamp.
FUNNEL_STAGE_TRIAL = "trial"
FUNNEL_STAGE_PAYING = "cliente"
FUNNEL_STAGE_LOST = "perdido_1781834581"
GITHUB_REPO = "jessefreitas/OmniRift"
FROM_EMAIL = "no-reply@omniforge.com.br"
# Email via SMTP direto (omnimail). user/pass = secrets (SMTP_USER/SMTP_PASS).
SMTP_HOST = "omnimail.omniforge.com.br"
SMTP_PORT = "465"
