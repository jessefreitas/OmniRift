# Release do OmniRift — builda os instaladores no GitHub e anexa ao Release.
# Dispara num push de tag `v*` (ex.: git tag v0.1.0 && git push --tags).
# Plataformas: Linux (.AppImage + .deb), Windows (.exe NSIS + .msi) e macOS Apple Silicon (.dmg).
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {} # permite disparar manual pela aba Actions

permissions:
  contents: write # tauri-action cria o Release e anexa os assets

jobs:
  # Guard: se o release da tag JÁ está publicado, PULA o build. O push-mirror Forgejo→github
  # re-empurra as tags (interval 8h + sync_on_commit) → re-dispara este workflow → o
  # tauri-action re-draftava o release publicado. Com o guard, o re-run vira no-op. Estável.
  guard:
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.chk.outputs.published }}
    steps:
      - name: Release já publicado?
        id: chk
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "published=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          draft=$(gh release view "${{ github.ref_name }}" -R "${{ github.repository }}" --json isDraft -q .isDraft 2>/dev/null || echo missing)
          echo "release '${{ github.ref_name }}' isDraft=$draft"
          if [ "$draft" = "false" ]; then echo "published=true" >> "$GITHUB_OUTPUT"; else echo "published=false" >> "$GITHUB_OUTPUT"; fi

      # Recusa release cuja versão NÃO seja estritamente > a última publicada — protege
      # o auto-update de downgrade acidental (ref P2 #16). Só p/ release novo, não manual.
      - name: versão > latest
        if: steps.chk.outputs.published != 'true' && github.event_name != 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          new="${{ github.ref_name }}"; new="${new#v}"
          latest=$(gh release view -R "${{ github.repository }}" --json tagName -q .tagName 2>/dev/null | sed 's/^v//' || echo "")
          if [ -z "$latest" ]; then echo "✓ sem release anterior — ok ($new)"; exit 0; fi
          if [ "$new" != "$latest" ] && [ "$(printf '%s\n%s\n' "$new" "$latest" | sort -V | tail -1)" = "$new" ]; then
            echo "✓ $new > $latest"
          else
            echo "❌ $new não é estritamente > latest $latest — recusado (protege auto-update)"; exit 1
          fi

  build:
    needs: guard
    if: needs.guard.outputs.published != 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            bundles: "deb,appimage"
          - os: windows-latest
            bundles: "nsis,msi"
          - os: macos-14
            bundles: "dmg"
    runs-on: ${{ matrix.os }}
    # Resiliência de rede em runner hospedado: o build do Windows já caiu com
    # "HTTP2 framing layer / curl failed" baixando crate. Desligar multiplexing HTTP2
    # (força HTTP/1.1) mata esse erro; retry alto cobre quedas pontuais; git via CLI
    # é mais robusto pra deps git. Evita o rerun manual do job.
    env:
      CARGO_NET_RETRY: "10"
      CARGO_HTTP_MULTIPLEXING: "false"
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Dependências do Linux (WebKitGTK etc.)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            libfuse3-dev pkg-config

      - run: npm ci

      # Builda o omnicompress-proxy (OmniCompress) e coloca como sidecar (externalBin)
      # ANTES do tauri build — senão o bundle falha por binário externo ausente.
      - name: Build OmniCompress sidecar
        shell: bash
        run: bash scripts/build-omnicompress.sh

      # OmniFS sidecar (omnifs-mcp, FUSE) — bundla SÓ no Linux; Win/Mac degradam pro
      # PATH/WSL. O tauri.linux.conf.json adiciona omnifs-mcp ao externalBin apenas
      # nesta plataforma, então o build Win/Mac NÃO exige o binário (não quebra o release).
      # Clona github.com/jessefreitas/omnifs (público) e builda -p omnifs-mcp.
      - name: Build OmniFS sidecar (Linux)
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        run: bash scripts/build-omnifs-sidecar.sh

      # OmniFS no macOS — BEST-EFFORT à prova de quebra. O omnifs-mcp usa FUSE (macFUSE).
      # Instala macFUSE, tenta buildar (continue-on-error), e SÓ cria o tauri.macos.conf.json
      # — que ativa o externalBin do omnifs — SE o binário compilou. Se falhar, o .dmg sai
      # SEM OmniFS (find_omnifs_bin degrada pro PATH); NUNCA quebra o release do macOS.
      # (Windows fica de fora: FUSE indisponível → OmniFS via WSL; o script já pula windows.)
      - name: Dependências do macOS (macFUSE — pro omnifs-mcp compilar)
        if: matrix.os == 'macos-14'
        continue-on-error: true
        run: brew install --cask macfuse || true

      - name: Build OmniFS sidecar (macOS, best-effort)
        if: matrix.os == 'macos-14'
        shell: bash
        continue-on-error: true
        run: bash scripts/build-omnifs-sidecar.sh

      - name: externalBin macOS condicional (só se o omnifs compilou)
        if: matrix.os == 'macos-14'
        shell: bash
        run: |
          TRIPLE="$(rustc -vV | sed -n 's/host: //p')"
          if [ -f "apps/desktop/src-tauri/binaries/omnifs-mcp-$TRIPLE" ]; then
            cp apps/desktop/src-tauri/tauri.linux.conf.json apps/desktop/src-tauri/tauri.macos.conf.json
            echo "OmniFS bundlado no macOS ✓ (omnifs-mcp-$TRIPLE)"
          else
            echo "OmniFS não compilou no macOS — .dmg sai sem OmniFS (degrade pro PATH)."
          fi

      # macOS sem Developer ID: força identidade ad-hoc ("-") no bundler Tauri.
      # Sem isso o .app sai linker-signed incompleto → Gatekeeper "is damaged".
      # tauri.conf.json já tem bundle.macOS.signingIdentity = "-"; o env reforça no job.
      # NÃO substitui notarization — só evita o falso "damaged" até haver cert pago.
      # Ver scripts/macos-adhoc-codesign.sh e scripts/install-macos.sh.
      - name: macOS ad-hoc signing identity (até Developer ID + notarize)
        if: matrix.os == 'macos-14'
        run: |
          echo "APPLE_SIGNING_IDENTITY=-" >> "$GITHUB_ENV"
          echo "→ signingIdentity ad-hoc (-) — seal do bundle no tauri build"

      - name: Build + Release (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Assinatura do updater (minisign). Secrets do repo no GitHub:
          #   TAURI_SIGNING_PRIVATE_KEY          = conteúdo de tools/.omnirift-updater.key
          #   TAURI_SIGNING_PRIVATE_KEY_PASSWORD = vazio (chave gerada sem senha)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "OmniRift ${{ github.ref_name }}"
          # Notas automáticas: o GitHub gera o "What's Changed" (commits + PRs) desde a
          # tag anterior — cada release passa a descrever o que mudou (antes o corpo saía
          # VAZIO porque nenhum body era passado).
          releaseBody: "Veja os detalhes em **What's Changed** abaixo (gerado dos commits desde a versão anterior)."
          generateReleaseNotes: true
          releaseDraft: true # DRAFT-THEN-PUBLISH: o job smoke-gate abaixo instala o .deb
          # deste draft, exige boot limpo e SÓ ENTÃO publica (gh release edit --draft=false).
          # Cliente/updater só enxergam release PUBLICADO → build que não abre nunca chega
          # a ninguém. O guard no topo segue pulando re-runs de release já publicado (o
          # caso do latest.json 404 era re-draft de release PUBLICADO — não acontece aqui).
          # Gera latest.json (feed do updater) + .sig de cada bundle e anexa ao Release.
          includeUpdaterJson: true
          args: --bundles ${{ matrix.bundles }}

      # GUARD de leitura: confere que o .app dentro do .dmg saiu com seal ad-hoc do
      # bundler. Verifica sem tocar no dmg — reempacotar invalidaria o .sig minisign
      # que o tauri-action acabou de gerar.
      # continue-on-error: macOS é best-effort e NÃO está no feed do updater (só
      # Linux/Win auto-atualizam). Uma regressão de seal no Mac não pode segurar a
      # entrega dessas duas — mesmo critério dos steps do OmniFS acima. Falha aparece
      # como annotation vermelha no run.
      - name: macOS — verificar seal ad-hoc do .dmg (não modifica)
        if: matrix.os == 'macos-14'
        shell: bash
        continue-on-error: true
        run: bash scripts/macos-verify-seal.sh

  # Gate de smoke no ARTEFATO REAL: instala o .deb do draft e exige boot limpo.
  # Verde → publica o release (updater/clientes passam a ver). Vermelho → fica DRAFT,
  # cliente nunca recebe; um re-run/re-tag re-tenta. Spec:
  # docs/superpowers/specs/2026-07-05-smoke-boot-gate-design.md
  smoke-gate:
    name: Smoke gate no artefato do release
    needs: [guard, build]
    if: needs.guard.outputs.published != 'true'
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4 # precisa do scripts/smoke-boot.sh

      - name: Instala xvfb + runtime webkit
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libwebkit2gtk-4.1-0 libappindicator3-1 librsvg2-2 fuse3

      - name: Baixa o .deb do draft
        run: |
          gh release download "${{ github.ref_name }}" \
            -R "${{ github.repository }}" \
            --pattern '*_amd64.deb' \
            --dir dist

      - name: Instala o .deb (o artefato EXATO que o cliente recebe)
        run: sudo dpkg -i dist/*_amd64.deb || sudo apt-get install -f -y

      - name: Smoke no artefato real
        run: bash scripts/smoke-boot.sh /usr/bin/omnirift

      - name: Publica o release (idempotente)
        run: |
          gh release edit "${{ github.ref_name }}" \
            -R "${{ github.repository }}" \
            --draft=false

  # Espelho de releases no R2 (egress zero via CDN). Roda DEPOIS do smoke-gate PUBLICAR:
  # baixa os assets do Release e os sobe pro bucket omnirift-releases — releases/<tag>/<nome>
  # (arquivo por tag) + releases/latest/<so-key> (ponteiro estável que o /download lê).
  # ⚠️ needs: smoke-gate é OBRIGATÓRIO — sem isso o mirror espelharia artefato de DRAFT
  # não-smoked pro CDN (o /download serve dali; cliente receberia build não validado).
  # Só em push de tag (não workflow_dispatch). Se falhar, FALHA visível: o Release no GitHub
  # já está publicado (fonte/updater intactos), então é seguro o mirror quebrar e ser re-rodado.
  mirror:
    needs: [build, smoke-gate]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Baixar assets do Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          gh release download "${{ github.ref_name }}" -R "${{ github.repository }}" -D dist
          echo "Assets baixados:"; ls -la dist

      - name: Espelhar pro R2 (releases/<tag>/ + releases/latest/)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          BUCKET="omnirift-releases"

          put() { # put <key> <arquivo>
            echo "→ $BUCKET/$1"
            # remote é o default do `r2 object put` (--local é o opt-in); --remote nem existe
            # nessa linha do wrangler. Versão fixada na testada end-to-end (3.114.17).
            npx --yes wrangler@3.114.17 r2 object put "$BUCKET/$1" --file="$2"
          }

          # Mapeia cada instalador → ponteiro estável por SO. Idempotente (sobrescreve).
          shopt -s nullglob nocaseglob
          for f in dist/*; do
            base="$(basename "$f")"
            # ignora assinaturas/feed do updater (esses ficam no GitHub Release)
            case "$base" in
              *.sig|latest.json) continue ;;
            esac

            # arquivo por tag: releases/<tag>/<nome-original>
            put "releases/$TAG/$base" "$f"

            # ponteiro estável releases/latest/<so-key>
            case "$base" in
              *x64-setup.exe) put "releases/latest/windows-setup.exe" "$f" ;;
              *.exe)          put "releases/latest/windows-setup.exe" "$f" ;;
              *.msi)          put "releases/latest/windows.msi" "$f" ;;
              *.AppImage)     put "releases/latest/linux.AppImage" "$f" ;;
              *.deb)          put "releases/latest/linux.deb" "$f" ;;
              *.dmg)          put "releases/latest/macos.dmg" "$f" ;;
            esac
          done
